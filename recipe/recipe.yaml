schema_version: 1

context:
  version: "1.3.0"

package:
  name: libpisp
  version: ${{ version }}

source:
  url: https://github.com/raspberrypi/libpisp/archive/v${{ version }}.tar.gz
  sha256: 4bd4dcf615f5c5c5a22586b16689373afad99e47e11383a3d6bb47eebef6b0a9

build:
  number: 1
  skip: not linux

requirements:
  build:
    - meson
    - ninja
    - python
    - pkg-config
    - ${{ compiler('cxx') }}
    - ${{ compiler('c') }}
    - ${{ stdlib('c') }}
  host:
    - nlohmann_json
  run_exports:
    - ${{ pin_subpackage('libpisp', upper_bound='x.x.x') }}

tests:
  - script:
      - test -f $PREFIX/lib/libpisp.so

about:
  summary: Library for interfacing with the Raspberry Pi PISP
  license: BSD-3-Clause
  license_file: LICENSE
  homepage: https://github.com/raspberrypi/libpisp

extra:
  recipe-maintainers:
    - carlodri
